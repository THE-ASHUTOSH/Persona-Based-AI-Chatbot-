services:
  - type: web
    name: scalervoices
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: GEMINI_API_KEY
        sync: false
